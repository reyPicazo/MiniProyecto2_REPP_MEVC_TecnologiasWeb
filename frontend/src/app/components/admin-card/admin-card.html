<div class="card-producto">
  <div class="card-info">
    <img [src]="'http://127.0.0.1:3000/img/' + producto.imagen">
    <h3>{{ producto.nombre }}</h3>
    <p>{{ producto.precio | currency:'USD' }}</p>
  </div>
  <div class="card-botones">
    <button (click)="actualizar()">Actualizar</button>
  </div>
</div>
