<app-navbar></app-navbar>


<div class="contacto-contenedor align-items-center">
    <h2>Contacto</h2>
    <p>Escríbenos tus dudas, comentarios o sugerencias.</p>

    <div class="contactForm">
        <form class="contacto">
            <div class="form-group">
                <label for="Nombre">Nombre</label>
                <input type="text" [(ngModel)]="nombre" name="nombre" class="input-rt" id="Nombre" placeholder="Tu nombre">
            </div>
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" [(ngModel)]="email" name="email" class="input-rt" id="email" placeholder="Tu correo electrónico">
            </div>
            <div class="form-group">
                <label for="asunto">Asunto</label>
                <input type="text" [(ngModel)]="asunto" name="asunto" class="input-rt" id="asunto" placeholder="El asunto de tu mensaje">
            </div>
            <div class="form-group">
                <label for="mensaje">Mensaje</label>
                <textarea [(ngModel)]="mensaje" name="mensaje" class="input-rt" id="mensaje" placeholder="Tu mensaje"></textarea>
            </div>
            <button class="btn-enviar" type="submit" (click)="enviarMSG()">Enviar</button>
        </form>
    </div>
</div>

<app-alert
  *ngIf="mostrarAlert"
  [tipo]="tipoAlert"
  [mensaje]="mensajeAlert"
  (cerrar)="mostrarAlert = false">
</app-alert>
